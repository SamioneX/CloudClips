name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # For OIDC federation with AWS
  contents: read

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK deploy
        run: cd infra && npx cdk deploy --all --require-approval never

      - name: Build frontend
        run: cd frontend && pnpm build

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name CloudClips-Storage \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          aws s3 sync frontend/dist "s3://${BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name CloudClips-Cdn \
            --query "Stacks[0].Outputs[?contains(OutputKey,'FrontendDistribution')].OutputValue" \
            --output text)
          aws cloudfront create-invalidation --distribution-id "${DIST_ID}" --paths "/*"
